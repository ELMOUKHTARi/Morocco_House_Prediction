name: MLOps Pipeline

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'                  # ✅ Cache des dépendances pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Train model
        run: python src/train.py
        working-directory: ${{ github.workspace }}   # ✅ Évite les problèmes de chemins relatifs

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/
          retention-days: 30            # ✅ Durée de rétention explicite

      - name: Upload MLflow DB
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-db              # ✅ Sauvegarde la DB MLflow pour consulter les runs
          path: mlflow.db
          retention-days: 30