name: MLOps Pipeline

on:
  push:
    branches: [ "main" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Train model
        run: python src/train.py
        working-directory: ${{ github.workspace }}

      - name: Upload model artifacts
        uses: actions/upload-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/
          retention-days: 30

      - name: Upload MLflow DB
        uses: actions/upload-artifact@v4
        with:
          name: mlflow-db
          path: mlflow.db
          retention-days: 30

  docker:
    runs-on: ubuntu-latest
    needs: build                        # ✅ Lance seulement si build réussit

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download model artifacts  # ✅ Récupère le modèle entraîné
        uses: actions/download-artifact@v4
        with:
          name: model-artifacts
          path: artifacts/

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            elmoukhtar/house-prediction-app:latest
            elmoukhtar/house-prediction-app:${{ github.sha }}