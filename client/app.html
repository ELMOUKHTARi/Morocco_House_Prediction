<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Home Price Prediction</title>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.4.1/jquery.min.js"></script>
    <script src="app.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            width: 400px;
            padding: 30px;
        }

        h2 {
            margin-bottom: 8px;
            color: #333;
        }

        .area {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .switch-field {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
        }

        .switch-field input {
            display: none;
        }

        .switch-field label {
            background-color: #f1f1f1;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        .switch-field input:checked + label {
            background-color: #2a5298;
            color: white;
        }

        select.location {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            margin-bottom: 20px;
        }

        .submit {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #2a5298, #1e3c72);
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .submit:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 22px;
            color: #2a5298;
            font-weight: bold;
        }

    </style>
</head>

<body>

    <div class="container">
        <form class="form">

            <h2>Area (metre carré)</h2>
            <input class="area" type="text" id="uiSqft" value="1000">

            <h2>CHAMBRE/salon/cuisin</h2>
            <div class="switch-field">
                <input type="radio" id="bhk1" name="uiBHK" value="1"/>
                <label for="bhk1">1</label>

                <input type="radio" id="bhk2" name="uiBHK" value="2" checked/>
                <label for="bhk2">2</label>

                <input type="radio" id="bhk3" name="uiBHK" value="3"/>
                <label for="bhk3">3</label>

                <input type="radio" id="bhk4" name="uiBHK" value="4"/>
                <label for="bhk4">4</label>

                <input type="radio" id="bhk5" name="uiBHK" value="5"/>
                <label for="bhk5">5</label>
            </div>

            <h2>Bath</h2>
            <div class="switch-field">
                <input type="radio" id="bath1" name="uiBathrooms" value="1"/>
                <label for="bath1">1</label>

                <input type="radio" id="bath2" name="uiBathrooms" value="2" checked/>
                <label for="bath2">2</label>

                <input type="radio" id="bath3" name="uiBathrooms" value="3"/>
                <label for="bath3">3</label>

                <input type="radio" id="bath4" name="uiBathrooms" value="4"/>
                <label for="bath4">4</label>

                <input type="radio" id="bath5" name="uiBathrooms" value="5"/>
                <label for="bath5">5</label>
            </div>

            <h2>Location</h2>
            <select class="location" id="uiLocations">
                <option disabled selected>Choose a Location</option>
                <option>City 1</option>
                <option>City 2</option>
            </select>

            <button class="submit" onclick="onClickedEstimatePrice()" type="button">
                Estimate Price
            </button>

            <div id="uiEstimatedPrice" class="result">
                <h3></h3>
            </div>

        </form>
    </div>

</body>
</html>
